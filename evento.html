<!DOCTYPE html>
<html>
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="css/estilos.css">

    <title>Reservas - Evento</title>

</head>

<body>

<nav class="navbar navbar-dark bg-dark w-100 px-3">

    <a id="inicio" class="navbar-brand btn btn-danger btn-sm" href="#">
        Inicio
    </a>

    <div class="d-flex flex-row gap-4 mx-auto text-white">

        <div class="paso-activo" style="opacity:0.3;">
            Elegir Edificio
        </div>

        <div class="paso-inactivo">
            Elegir Tipo de Evento
        </div>

        <div class="paso-inactivo" style="opacity:0.3;">
            Elegir Laboratorio
        </div>

        <div class="paso-inactivo" style="opacity:0.3;">
            Confirmar Reserva
        </div>

    </div>

</nav>

<!-- CONTENIDO UN POCO MÁS ARRIBA -->
<div class="d-flex flex-column justify-content-center align-items-center vh-100 contenido-ajustado">

    <div class="text-center w-100">

        <h1 class="fw-bold">LAB KONTROL</h1>

        <h2>Reserve un laboratorio para sus actividades académicas</h2>

        <h4>Ingrese los datos de su evento</h4>

        <br>

    </div>

    <div class="form-group w-25 text-start">

        <label for="alumnos">Cantidad de alumnos</label>
        <input type="number" id="alumnos" class="form-control">

    </div>

    <br>

    <div class="form-group w-25 text-start">

        <label>Tipo de evento</label>

        <select class="form-select" id="evento">
            <option>Seleccionar</option>
            <option>Clase regular</option>
            <option>Exámen</option>
            <option>Capacitación</option>
            <option>Tutoria</option>
            <option>Evento institucional</option>
            <option>Practica Especial</option>
        </select>

    </div>

    <br>

    <div class="form-group w-25 text-start">

        <label for="fecha">Fecha para la reserva</label>
        <input type="date" id="fecha" class="form-control">

    </div>

    <br><br>

    <div class="d-flex justify-content-center gap-3">

        <button id="botonAtras" type="button" class="btn btn-lg">
            Atras
        </button>

        <button id="botonSiguiente" type="button" class="btn btn-lg">
            Siguiente
        </button>
    </div>
</div>
<script src="evento.js"></script>
</body>
</html>
