<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="css/estilos.css">

    <title>Lab Kontrol</title>
</head>

<body>

<nav class="navbar w-100">
    <a id="inicio" class="navbar-brand btn btn-sm" href="login.html">
        Inicio
    </a> 
</nav>


<div class="contenido d-flex justify-content-center vh-100 pt-5">

    <div class="container">

        <h1 class="text-center mt-3 mb-3"><b>LAB KONTROL</b></h1>

        <h4 class="text-center mb-4">
            Habilitar o deshabilitar los laboratorios y sus recursos
        </h4>


        <div class="mx-auto" style="width: 70%;">


            <table class="table table-bordered table-hover text-center">


                <thead>
                    <tr>

                        <th>Recursos</th>


                        <th>
                            Laboratorio 1
                            <br>
                            <input class="lab-check" type="checkbox" id="lab1">
                        </th>


                        <th>
                            Laboratorio 2
                            <br>
                            <input class="lab-check" type="checkbox" id="lab2">
                        </th>


                        <th>
                            Laboratorio 3
                            <br>
                            <input class="lab-check" type="checkbox" id="lab3">
                        </th>


                        <th>
                            Laboratorio 4
                            <br>
                            <input class="lab-check" type="checkbox" id="lab4">
                        </th>


                        <th>
                            Laboratorio 5
                            <br>
                            <input class="lab-check" type="checkbox" id="lab5">
                        </th>

                    </tr>
                </thead>



                <tbody id="laboratorios-list">


                    <tr>
                        <td>Conexión a Internet</td>

                        <td><input class="form-check-input" type="checkbox" id="internet1"></td>
                        <td><input class="form-check-input" type="checkbox" id="internet2"></td>
                        <td><input class="form-check-input" type="checkbox" id="internet3"></td>
                        <td><input class="form-check-input" type="checkbox" id="internet4"></td>
                        <td><input class="form-check-input" type="checkbox" id="internet5"></td>
                    </tr>



                    <tr>
                        <td>Proyector</td>

                        <td><input class="form-check-input" type="checkbox" id="proyector1"></td>
                        <td><input class="form-check-input" type="checkbox" id="proyector2"></td>
                        <td><input class="form-check-input" type="checkbox" id="proyector3"></td>
                        <td><input class="form-check-input" type="checkbox" id="proyector4"></td>
                        <td><input class="form-check-input" type="checkbox" id="proyector5"></td>
                    </tr>



                    <tr>
                        <td>Aire Acondicionado</td>

                        <td><input class="form-check-input" type="checkbox" id="aire1"></td>
                        <td><input class="form-check-input" type="checkbox" id="aire2"></td>
                        <td><input class="form-check-input" type="checkbox" id="aire3"></td>
                        <td><input class="form-check-input" type="checkbox" id="aire4"></td>
                        <td><input class="form-check-input" type="checkbox" id="aire5"></td>
                    </tr>



                    <tr>
                        <td>Impresora 3D</td>

                        <td><input class="form-check-input" type="checkbox" id="impresora1"></td>
                        <td><input class="form-check-input" type="checkbox" id="impresora2"></td>
                        <td><input class="form-check-input" type="checkbox" id="impresora3"></td>
                        <td><input class="form-check-input" type="checkbox" id="impresora4"></td>
                        <td><input class="form-check-input" type="checkbox" id="impresora5"></td>
                    </tr>



                    <tr>
                        <td>Pizarra Digital</td>

                        <td><input class="form-check-input" type="checkbox" id="digital1"></td>
                        <td><input class="form-check-input" type="checkbox" id="digital2"></td>
                        <td><input class="form-check-input" type="checkbox" id="digital3"></td>
                        <td><input class="form-check-input" type="checkbox" id="digital4"></td>
                        <td><input class="form-check-input" type="checkbox" id="digital5"></td>
                    </tr>



                    <tr>
                        <td>Pizarra Acrílica</td>

                        <td><input class="form-check-input" type="checkbox" id="pizarra1"></td>
                        <td><input class="form-check-input" type="checkbox" id="pizarra2"></td>
                        <td><input class="form-check-input" type="checkbox" id="pizarra3"></td>
                        <td><input class="form-check-input" type="checkbox" id="pizarra4"></td>
                        <td><input class="form-check-input" type="checkbox" id="pizarra5"></td>
                    </tr>


                </tbody>


            </table>


        </div>

    </div>

</div>


<script src="./js/"></script>

</body>

</html>
