<!DOCTYPE html>
<html lang="es">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="css/estilos.css">
    <link rel="stylesheet" href="css/calendario.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <title>Reservas - Evento</title>

</head>

<body>

<nav class="navbar navbar-dark bg-dark w-100 px-3">

    <a id="inicio" class="navbar-brand btn btn-sm" href="edificio.html">
        Inicio
    </a>

</nav>

<div class="contenido-ajustado vh-100">

    <!-- TÍTULO -->
    <div class="text-center py-3">

        <h1 class="fw-bold">LAB KONTROL</h1>
        <h2>Reserve un laboratorio para sus actividades académicas</h2>
        <h4>Ingrese los datos de su evento</h4>

        <div class="d-flex justify-content-center flex-wrap my-4">

            <div class="rounded-pill py-2 px-4" style="background-color:#e5e5e5; color:#999; min-width:220px;">
                1. Elegir Edificio
            </div>

            <div class="rounded-pill py-2 px-4 ms-2 text-white" style="background-color:#6c6480; min-width:220px;">
                2. Elegir Tipo de Actividad
            </div>

            <div class="rounded-pill py-2 px-4 ms-2" style="background-color:#e5e5e5; color:#999; min-width:220px;">
                3. Elegir Laboratorio
            </div>

            <div class="rounded-pill py-2 px-4 ms-2" style="background-color:#e5e5e5; color:#999; min-width:220px;">
                4. Confirmar Reserva
            </div>

        </div>

    </div>

    <!-- CONTENIDO -->
    <div class="d-flex justify-content-center align-items-start gap-5">

        <!-- IZQUIERDA -->
        <div class="contenedor-izquierda">

            <form id="form" style="width:450px;">

                <div class="mb-3 text-start">
                    <label for="alumnos" class="form-label">
                        Cantidad de alumnos
                    </label>
                    <input type="number" id="alumnos" name="alumnos" class="form-control" required>
                </div>

                <div class="mb-3 text-start">

                    <label for="evento" class="form-label">
                        Tipo de actividad
                    </label>

                    <select class="form-select" id="evento" name="evento" required>

                        <option value="">Seleccionar</option>
                        <option value="Clase Regular">Clase regular</option>
                        <option value="Examen">Examen</option>
                        <option value="Capacitacion">Capacitación</option>
                        <option value="Tutoria">Tutoría</option>
                        <option value="Evento Institucional">Evento institucional</option>
                        <option value="Practica Especial">Práctica especial</option>

                    </select>

                </div>

                <div id="fecha" class="calendar-container">

                    <div class="calendar-header">

                        <div class="nav-buttons">

                            <button type="button" id="prev-month" class="nav-btn">
                                <i class="fas fa-chevron-left"></i>
                            </button>

                            <button type="button" id="next-month" class="nav-btn">
                                <i class="fas fa-chevron-right"></i>
                            </button>

                        </div>

                        <div class="month-year" id="month-year">
                            Julio 2026
                        </div>

                    </div>

                    <div class="weekdays">
                        <div>Dom</div><div>Lun</div><div>Mar</div>
                        <div>Mié</div><div>Jue</div><div>Vie</div><div>Sáb</div>
                    </div>

                    <div class="days" id="days"></div>

                    <div class="calendar-footer">

                        <button type="button" id="today-btn" class="today-btn">
                            <i class="fas fa-calendar-day"></i> Hoy
                        </button>

                    </div>

                </div>

            </form>

        </div>

        <!-- DERECHA -->
        <div class="col-derecha">

            <div id="recursos" class="card shadow-sm">

                <div class="card-header text-white" style="background:#6c6480;">
                    <h5 class="mb-0">Recursos a utilizar</h5>
                </div>

                <div class="card-body">

                    <div class="form-check mb-2">
                        <input class="form-check-input" type="checkbox" id="internet" value="internet">
                        <label class="form-check-label" for="internet">Conexión a internet</label>
                    </div>

                    <div class="form-check mb-2">
                        <input class="form-check-input" type="checkbox" id="proyector" value="proyector">
                        <label class="form-check-label" for="proyector">Proyector</label>
                    </div>

                    <div class="form-check mb-2">
                        <input class="form-check-input" type="checkbox" id="aireAcondicionado" value="aireAcondicionado">
                        <label class="form-check-label" for="aireAcondicionado">Aire acondicionado</label>
                    </div>

                    <div class="form-check mb-2">
                        <input class="form-check-input" type="checkbox" id="impresora" value="impresora">
                        <label class="form-check-label" for="impresora">Impresora 3D</label>
                    </div>

                    <div class="form-check mb-2">
                        <input class="form-check-input" type="checkbox" id="pizarraDigital" value="pizarraDigital">
                        <label class="form-check-label" for="pizarraDigital">Pizarra digital</label>
                    </div>

                    <div class="form-check mb-2">
                        <input class="form-check-input" type="checkbox" id="pizarraAcrilica" value="pizarraAcrilica">
                        <label class="form-check-label" for="pizarraAcrilica">Pizarra acrílica</label>
                    </div>

                </div>
            </div>

            <!-- BOTONES ABAJO DE CHECKBOX -->
            <div class="d-flex justify-content-center gap-3 mt-3">

                <button id="botonAtras" type="button" class="btn btn-lg">
                    Atrás
                </button>

                <button id="botonSiguiente" type="button" class="btn btn-lg">
                    Siguiente
                </button>

            </div>

        </div>

    </div>

</div>

<script src="./js/evento.js"></script>

</body>
</html>
