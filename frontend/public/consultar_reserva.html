<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="css/estilos.css">

    <title>Consultar</title>
</head>

<body>

<nav class="navbar navbar-dark bg-dark px-3">

</nav>

<div class="container py-5">

    <div class="text-center mb-5">

        <h1 class="fw-bold">LAB KONTROL</h1>

        <h2>
            Reserve un laboratorio para sus actividades académicas
        </h2>

        <h4 class="text-muted">
            Ingrese sus datos para consultar su reserva
        </h4>

    </div>

    </div>

    <div class="row justify-content-center g-5">

        <div class="col-lg-6">

            <div class="card shadow-sm border-0">

                <div class="card-body p-4">

                    <div class="mb-3">
                        <label class="form-label">Documento de Identidad</label>

                        <div class="row">

                            <div class="col-md-5 mb-2">
                                <select id="tipoCedula" class="form-select">
                                    <option selected disabled>Tipo de Documento</option>
                                    <option>Cédula de Identidad</option>
                                    <option>Pasaporte</option>
                                    <option>Documento Extranjero</option>
                                </select>
                            </div>

                            <div class="col-md-7">
                                <input type="text" id="numeroCedula" class="form-control" placeholder="Número de documento">
                            </div>

                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Correo Institucional</label>
                        <input type="email" id="correo" class="form-control">
                    </div>

                    <div class="d-flex justify-content-between">

                        <button id="botonAtras"
                                type="button"
                                class="btn btn-outline-secondary px-4">
                            Atrás
                        </button>

                        <button id="botonConsultar"
                                type="button"
                                class="btn btn-primary px-4">
                            Consultar Reserva
                        </button>

                    </div>

                </div>

            </div>

        </div>
</div>

<div class="modal fade" id="modalError" tabindex="-1">

    <div class="modal-dialog modal-dialog-centered">

        <div class="modal-content shadow border-0"
             style="border-radius:20px; overflow:hidden;">

            <div class="modal-header text-white"
                 style="background:#6c6480;">

                <h5 class="modal-title fw-bold">

                    Campos incompletos

                </h5>

                <button type="button"
                        class="btn-close btn-close-white"
                        data-bs-dismiss="modal">

                </button>

            </div>

            <div class="modal-body text-center p-4">

                <h5 class="fw-bold">

                    No se pudo realizar la consulta

                </h5>

                <p class="text-muted">

                    Complete todos los campos para consultar su reserva.

                </p>

            </div>

            <div class="modal-footer justify-content-center border-0 pb-4">

                <button type="button"
                        class="btn text-white px-4"
                        data-bs-dismiss="modal"
                        style="
                        background:#6c6480;
                        border-radius:20px;">

                    Aceptar

                </button>

            </div>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="./js/consultar_reserva.js"></script>

</body>
</html>
