<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reprogramar Reserva</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="css/calendario_administrador.css">
</head>

<body class="bg-light">

    <nav class="navbar navbar-dark bg-secondary px-3">
        <a id="inicio" class="btn btn-dark btn-sm" href="#">
            Atrás
        </a>
    </nav>

    <div class="container mt-5">

        <div class="card shadow mx-auto" style="max-width: 600px;">

            <div class="card-body">

                <h2 class="text-center mb-4">
                    Reprogramar Reserva
                </h2>

                <p class="text-muted text-center small">
                    Solo se puede cambiar el laboratorio, la fecha y el horario.
                    Para cambiar otros datos, cancelá la reserva y creá una nueva.
                </p>

                <form id="update-reserva-form">

                    <div class="mb-3">
                        <label class="form-label">Laboratorio</label>
                        <select id="laboratorio" class="form-control" required>
                            <option value="">Seleccione un laboratorio</option>
                        </select>
                    </div>

                    <div id="fecha" class="calendar-container">

                    <div class="calendar-header">

                        <div class="nav-buttons">

                            <button type="button" id="prev-month" class="nav-btn">
                                <i class="fas fa-chevron-left"></i>
                            </button>

                            <button type="button" id="next-month" class="nav-btn">
                                <i class="fas fa-chevron-right"></i>
                            </button>

                        </div>

                        <div class="month-year" id="month-year">
                            Julio 2026
                        </div>

                    </div>

                    <div class="weekdays">
                        <div>Dom</div><div>Lun</div><div>Mar</div>
                        <div>Mié</div><div>Jue</div><div>Vie</div><div>Sáb</div>
                    </div>

                    <div class="days" id="days"></div>

                    <div class="calendar-footer">

                        <button type="button" id="today-btn" class="today-btn">
                            <i class="fas fa-calendar-day"></i> Hoy
                        </button>

                    </div>

                </div>

                    <div class="mb-3">
                        <label class="form-label">Hora inicio</label>
                        <input type="time" id="horaInicio" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Hora fin</label>
                        <input type="time" id="horaFin" class="form-control" required>
                    </div>

                    <button type="submit" class="btn btn-dark w-100">
                        Reprogramar Reserva
                    </button>

                    <div id="error-message" class="text-danger text-center mt-3"></div>

                </form>

            </div>

        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./js/upd_reserva.js"></script>

</body>
</html>
