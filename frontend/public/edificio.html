<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/css/bootstrap.min.css">

    <link rel="stylesheet" href="css/estilos.css">

    <title>Reserva - Edificio</title>
</head>

<body>

    <nav class="navbar navbar-dark bg-dark px-3">

        <a id="inicio"
           class="navbar-brand btn btn-sm" 
           href="#">
            Inicio
        </a>

    </nav>


    <div class="container text-center mt-5">

        <h1 class="fw-bold">
            LAB KONTROL
        </h1>


        <h2>
            Reserve un laboratorio para sus actividades académicas
        </h2>


        <br>


        <h4>
            Seleccione el edificio donde se realiza su actividad
        </h4>



        <div class="d-flex justify-content-center flex-column flex-md-row flex-wrap my-4">


            <div class="rounded-pill py-2 px-4 text-white"
                 style="background-color:#6c6480; min-width:220px;">
                1. Elegir Edificio
            </div>


            <div class="rounded-pill py-2 px-4 ms-md-2 mt-2 mt-md-0"
                 style="background-color:#e5e5e5; color:#999; min-width:220px;">
                2. Elegir Laboratorio
            </div>


            <div class="rounded-pill py-2 px-4 ms-md-2 mt-2 mt-md-0"
                 style="background-color:#e5e5e5; color:#999; min-width:220px;">
                3. Elegir Tipo de Actividad
            </div>


            <div class="rounded-pill py-2 px-4 ms-md-2 mt-2 mt-md-0"
                 style="background-color:#e5e5e5; color:#999; min-width:220px;">
                4. Confirmar Reserva
            </div>


        </div>



        <br>



        <div class="d-flex justify-content-center gap-3 gap-md-4 flex-wrap">



            <button id="edif1" 
                    class="btn btn-outline-dark text-center p-2"
                    style="width:180px; height:250px;">

                <img src="image/biblioteca.jpeg"
                     style="width:100%; height:140px; object-fit:cover;"
                     class="mb-2">

                <strong>
                    Biblioteca Pablo VI
                </strong>

            </button>





            <button id="edif2" 
                    class="btn btn-outline-dark text-center p-2"
                    style="width:180px; height:250px;">

                <img src="image/contables.jpeg"
                     style="width:100%; height:140px; object-fit:cover;"
                     class="mb-2">

                <strong>
                    Ciencias Contables
                </strong>

            </button>





            <button id="edif3" 
                    class="btn btn-outline-dark text-center p-2"
                    style="width:180px; height:250px;">

                <img src="image/cyt.jpeg"
                     style="width:100%; height:140px; object-fit:cover;"
                     class="mb-2">

                <strong>
                    Ciencias y Tecnología
                </strong>

            </button>





            <button id="edif4" 
                    class="btn btn-outline-dark text-center p-2"
                    style="width:180px; height:250px;">

                <img src="image/cyt2.jpeg"
                     style="width:100%; height:140px; object-fit:cover;"
                     class="mb-2">

                <strong>
                    Bloque G
                </strong>

            </button>



        </div>




        <div id="edificios-list" style="display:none;"></div>


        <!-- agregado porque edificio.js lo necesita -->
        <ul id="lista-historial" style="display:none;"></ul>



        <br><br>


        <p id="resultado"></p>


    </div>



    <script src="./js/edificio.js"></script>

</body>

</html>
