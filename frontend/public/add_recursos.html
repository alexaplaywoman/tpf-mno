<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Agregar Recurso</title>


    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/css/bootstrap.min.css">

</head>


<body class="bg-light">


<nav class="navbar navbar-dark bg-secondary px-3">

    <a id="inicio"
       class="btn btn-dark btn-sm"
       href="#">
        Atrás
    </a>

</nav>


<div class="container mt-5">

    <div class="card shadow mx-auto" style="max-width:600px;">

        <div class="card-body">

            <h2 class="text-center mb-4">
                Agregar Nuevo Recurso
            </h2>

            <form id="add-recurso-form">

                <!-- LABORATORIO -->

                <div class="mb-3">

                    <label class="form-label">
                        Laboratorio
                    </label>

                    <select
                        id="laboratorio"
                        class="form-control"
                        required>

                        <option value="">
                            Seleccione un laboratorio
                        </option>

                    </select>

                </div>


                <!-- NOMBRE -->

                <div class="mb-3">

                    <label class="form-label">
                        Nombre
                    </label>

                    <input type="text"
                           id="nombre"
                           class="form-control"
                           placeholder="Ej: Proyector"
                           required>

                </div>


                <!-- DESCRIPCION -->

                <div class="mb-3">

                    <label class="form-label">
                        Descripción
                    </label>

                    <input type="text"
                           id="descripcion"
                           class="form-control"
                           placeholder="Ej: Proyector Epson 3500 lúmenes"
                           required>

                </div>


                <!-- DISPONIBILIDAD -->

                <div class="mb-3">

                    <label class="form-label">
                        Disponibilidad
                    </label>

                    <select
                        id="disponibilidad"
                        class="form-control"
                        required>

                        <option value="S">Disponible</option>
                        <option value="N">No disponible</option>

                    </select>

                </div>


                <button type="submit"
                        class="btn btn-dark w-100">
                    Agregar Recurso
                </button>

                <div id="error-message"
                     class="text-danger text-center mt-3">
                </div>

            </form>

        </div>

    </div>

</div>


<script src="./js/add_recurso.js"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
