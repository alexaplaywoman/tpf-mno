<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="css/estilos.css">

    <title>Reservas</title>
</head>

<body>

<nav class="navbar navbar-dark bg-dark px-3">

    <a id="inicio" class="navbar-brand btn btn-danger btn-sm" href="#">
        Inicio
    </a>

</nav>

<div class="container py-5">

    <div class="text-center mb-5">

        <h1 class="fw-bold">LAB KONTROL</h1>

        <h2>
            Reserve un laboratorio para sus actividades académicas
        </h2>

        <h4 class="text-muted">
            Ingrese sus datos para confirmar la reserva
        </h4>

    </div>

    <!-- Línea de tiempo -->
    <div class="d-flex justify-content-center flex-wrap gap-3 mb-5">

        <div class="rounded-pill d-flex justify-content-center align-items-center"
             style="width:220px; height:45px; background:#e5e5e5; color:#999;">
            1. Elegir Edificio
        </div>

        <div class="rounded-pill d-flex justify-content-center align-items-center"
             style="width:220px; height:45px; background:#e5e5e5; color:#999;">
            2. Elegir Tipo de Evento
        </div>

        <div class="rounded-pill d-flex justify-content-center align-items-center"
             style="width:220px; height:45px; background:#e5e5e5; color:#999;">
            3. Elegir Sala
        </div>

        <div class="rounded-pill d-flex justify-content-center align-items-center text-white"
             style="width:220px; height:45px; background:#6c6480;">
            4. Confirmar Reserva
        </div>

    </div>

    <div class="row justify-content-center g-5">

        <!-- FORMULARIO -->
        <div class="col-lg-6">

            <div class="card shadow-sm border-0">

                <div class="card-body p-4">

                    <div class="mb-3">
                        <label class="form-label">Documento de Identidad</label>
                        <input type="number" class="form-control">
                    </div>

                    <div class="row">

                        <div class="col-md-6 mb-3">
                            <label class="form-label">Nombre</label>
                            <input type="text" class="form-control">
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label">Apellido</label>
                            <input type="text" class="form-control">
                        </div>

                    </div>

                    <div class="mb-3">
                        <label class="form-label">Correo Institucional</label>
                        <input type="email" class="form-control">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Teléfono</label>
                        <input type="number" class="form-control">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Departamento</label>

                        <select class="form-select">

                            <option>Seleccionar</option>
                            <option>DA - Arquitectura</option>
                            <option>DAS - Análisis de Sistemas</option>
                            <option>DEI - Ing. Informática y Electrónica</option>
                            <option>DICIA - Ing. Civil, Industrial y Ambiental</option>
                            <option>DIS - Diseño Gráfico e Industrial</option>

                        </select>

                    </div>

                    <div class="mb-4">
                        <label class="form-label">Solicitante</label>

                        <select class="form-select">

                            <option>Seleccionar</option>
                            <option>Docente</option>
                            <option>Estudiante</option>
                            <option>Personal Administrativo</option>

                        </select>

                    </div>

                    <div class="d-flex justify-content-between">

                        <button id="botonAtras"
                                type="button"
                                class="btn btn-outline-secondary px-4">
                            Atrás
                        </button>

                        <button id="botonSiguiente"
                                type="button"
                                class="btn btn-primary px-4">
                            Confirmar
                        </button>

                    </div>

                </div>

            </div>

        </div>

        <!-- DATOS DE RESERVA -->
        <div class="col-lg-4">

            <div class="card shadow-sm border-0">

                <div class="card-header text-white"
                     style="background:#6c6480;">

                    <h5 class="mb-0">
                        Datos de la Reserva
                    </h5>

                </div>

                <div class="card-body">

                    <p><strong>Fecha:</strong></p>

                    <hr>

                    <p><strong>Cantidad de alumnos:</strong></p>

                    <hr>

                    <p><strong>Tipo de actividad:</strong></p>

                    <hr>

                    <p><strong>Edificio:</strong></p>

                    <hr>

                    <p><strong>Laboratorio:</strong></p>

                </div>

            </div>

        </div>

    </div>

</div>

<script src="confirmar.js"></script>

</body>
</html>
