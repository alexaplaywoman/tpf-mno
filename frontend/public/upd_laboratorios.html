<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Actualizar Laboratorio</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/css/bootstrap.min.css">
</head>

<body class="bg-light">

    <nav class="navbar navbar-dark bg-secondary px-3">
        <a id="inicio" class="btn btn-dark btn-sm" href="#">
            Atrás
        </a>
    </nav>

    <div class="container mt-5">

        <div class="card shadow mx-auto" style="max-width: 600px;">

            <div class="card-body">

                <h2 class="text-center mb-4">
                    Actualizar Laboratorio
                </h2>

                <form id="update-laboratorio-form">

                    <div class="mb-3">
                        <label class="form-label">
                            Edificio
                        </label>
                        <select 
                            id="edificio"
                            class="form-control"
                            required>
                            <option value="">
                                Seleccione un edificio
                            </option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">
                            Capacidad de Alumnos
                        </label>
                        <input type="number" id="capacidad_alumnos" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">
                            Cantidad de computadoras
                        </label>
                        <input type="number" id="cantidad_computadoras" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">
                            Velocidad de la conexión a internet
                        </label>
                        <input type="text" id="velocidad_internet" class="form-control" required>
                    </div>

                    <button 
                        type="submit"
                        class="btn btn-dark w-100">
                        Actualizar Laboratorio
                    </button>

                    <div 
                        id="error-message"
                        class="text-danger text-center mt-3">
                    </div>

                </form>

            </div>

        </div>

    </div>

    <script src="./js/upd_laboratorio.js"></script>

</body>
</html>
