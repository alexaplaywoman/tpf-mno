<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="css/estilos.css">
    <title>Cancelar</title>
</head>
<body>

<nav class="navbar navbar-dark bg-dark px-3"></nav>

<div class="container py-5">

    <div class="text-center mb-5">
        <h1 class="fw-bold">LAB KONTROL</h1>
        <h2>Reserve un laboratorio para sus actividades académicas</h2>
        <h4 class="text-muted">Ingrese sus datos para cancelar su reserva</h4>
    </div>

    <div class="row justify-content-center g-5">
        <div class="col-lg-6">
            <div class="card shadow-sm border-0">
                <div class="card-body p-4">

                    <div class="mb-3">
                        <label class="form-label">Documento de Identidad</label>
                        <div class="row">
                            <div class="col-md-5 mb-2">
                                <select id="tipoDocumento" class="form-select">
                                    <option value="" selected disabled>Tipo</option>
                                    <option>Cédula de Identidad</option>
                                    <option>Pasaporte</option>
                                    <option>Documento Extranjero</option>
                                </select>
                            </div>
                            <div class="col-md-7">
                                <input id="numeroDocumento" type="number" class="form-control"
                                       placeholder="Número de documento">
                            </div>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Correo Institucional</label>
                        <input id="correo" type="email" class="form-control"
                               placeholder="usuario@uc.edu.py">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Motivo de Cancelación</label>
                        <select id="motivo" class="form-select">
                            <option value="" selected disabled>Seleccione un motivo</option>
                            <!-- Las opciones se cargan por fetch desde el backend -->
                        </select>
                    </div>

                    <div id="mensajeError" class="text-danger mb-3" style="display:none;"></div>

                    <div class="d-flex justify-content-between">
                        <button id="botonAtras" type="button" class="btn btn-outline-secondary px-4">
                            Atrás
                        </button>
                        <button id="botonCancelar" type="button" class="btn px-4 text-white"
                                style="background:#6c6480; border-color:#6c6480;">
                            Cancelar Reserva
                        </button>
                    </div>

                </div>
            </div>
        </div>
    </div>

</div>

<script src="./js/cancelar.js"></script>
</body>
</html>
