<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="css/estilos.css">

    <title>Cancelar</title>
</head>

<body>

<nav class="navbar navbar-dark bg-dark px-3">

</nav>

<div class="container py-5">

    <div class="text-center mb-5">

        <h1 class="fw-bold">LAB KONTROL</h1>

        <h2>
            Reserve un laboratorio para sus actividades académicas
        </h2>

        <h4 class="text-muted">
            Ingrese sus datos para cancelar su reserva
        </h4>

    </div>

    </div>

    <div class="row justify-content-center g-5">

        <div class="col-lg-6">

            <div class="card shadow-sm border-0">

                <div class="card-body p-4">

                    <div class="mb-3">
                        <label class="form-label">Documento de Identidad</label>

                        <div class="row">

                            <div class="col-md-5 mb-2">
                                <select class="form-select">
                                    <option selected disabled>Tipo</option>
                                    <option>Cédula de Identidad</option>
                                    <option>Pasaporte</option>
                                    <option>Documento Extranjero</option>
                                </select>
                            </div>

                            <div class="col-md-7">
                                <input
                                    type="number"
                                    class="form-control"
                                    placeholder="Número de documento">
                            </div>

                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Correo Institucional</label>
                        <input type="email" class="form-control">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Motivo de Cancelación</label>

                        <div class="row">

                            <div class="col-md-5 mb-2">
                                <select class="form-select">
                                    <option selected disabled>Seleccione</option>
                                    <option>Enfermedad</option>
                                    <option>Solapamiento</option>
                                    <option>Error de fecha</option>
                                    <option>Otros</option>
                                </select>
                            </div><br><br>

                    <div class="d-flex justify-content-between">

                        <button id="botonAtras"
                                type="button"
                                class="btn btn-outline-secondary px-4">
                            Atrás
                        </button>

                        <button id="botonAtras"
                                type="button"
                                class="btn btn-outline-secondary px-4">
                            Cancelar Reserva
                        </button>

                    </div>

                </div>

            </div>

        </div>
</div>

<script src="./js/consultar_reserva.js"></script>

</body>
</html>
