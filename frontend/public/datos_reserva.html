<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="css/estilos.css">

    <title>Consultar Reserva</title>
</head>

<body>

<nav class="navbar navbar-dark bg-dark px-3">

    <a id="botonAtras" class="navbar-brand btn" href="#">
        Atrás
    </a>

</nav>

<div class="container py-5">

    <div class="text-center mb-5">

        <h1 class="fw-bold">LAB KONTROL</h1>

        <h2>
            Reserve un laboratorio para sus actividades académicas
        </h2>

    </div>

    <div class="row justify-content-center g-5">

        <div class="col-lg-6">

            <div id="contenedorReservas"></div>

        </div>

    </div>

</div>

<!-- Modal -->
<div class="modal fade" id="modalCancelar" tabindex="-1" aria-labelledby="modalCancelarLabel" aria-hidden="true">

    <div class="modal-dialog modal-dialog-centered">

        <div class="modal-content">

            <div class="modal-header text-white"
                 style="background:#6c6480;">

                <h5 class="modal-title" id="modalCancelarLabel">
                    Cancelar Reserva
                </h5>

                <button type="button"
                        class="btn-close btn-close-white"
                        data-bs-dismiss="modal"
                        aria-label="Cerrar">
                </button>

            </div>

            <div class="modal-body text-center">

                <p class="mb-0">
                    ¿Está seguro de que desea cancelar esta reserva?
                </p>

            </div>

            <div class="modal-footer justify-content-center">

                <button type="button"
                        class="btn btn-outline-secondary px-4"
                        data-bs-dismiss="modal">
                    No
                </button>

                <button id="confirmarCancelar"
                        type="button"
                        class="btn px-4 text-white"
                        style="background:#6c6480; border-color:#6c6480;">
                    Sí, cancelar
                </button>

            </div>

        </div>

    </div>

</div>

<!-- paginación -->

    <div class="d-flex justify-content-center">

        <nav aria-label="Page navigation example">

            <ul class="pagination">

                <li class="page-item">

                    <button class="page-link" onclick="previusPage()">

                        <span aria-hidden="true">&laquo;</span>

                    </button>

                </li>

                <span id="items" class="d-flex"></span>

                <li class="page-item">

                    <button class="page-link" onclick="nextPage()">

                        <span aria-hidden="true">&raquo;</span>

                    </button>

                </li>

            </ul>

        </nav>

    </div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="./js/datos_reserva.js"></script>

</body>
</html>
