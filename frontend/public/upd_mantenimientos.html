<!DOCTYPE html>
<html lang="es">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Actualizar Mantenimiento</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="css/calendario.css">
    <link rel="stylesheet" href="css/admin.css">

</head>

<body>

    <nav class="navbar navbar-dark bg-secondary px-3">
        <a id="inicio" class="btn btn-dark btn-sm" href="#">
            Atrás
        </a>
    </nav>

    <div class="container mt-5">

        <div class="card shadow mx-auto" style="max-width: 600px;">

            <div class="card-body">

                <h2 class="text-center mb-4">
                    Actualizar Mantenimiento
                </h2>

                <p class="text-muted text-center small">
                    Solo se puede cambiar el estado, la fecha fin prevista y las observaciones.
                </p>

                <form id="update-mantenimiento-form">

                    <div class="mb-3">
                        <label class="form-label">Estado</label>
                        <select id="estado" class="form-control" required>
                            <option value="">Seleccione un estado</option>
                        </select>
                    </div>

                    <label class="form-label">Fecha fin prevista</label>

                    <input type="hidden" id="fechaFinPrevista">

                    <div class="calendar-container">

                    <div class="calendar-header">

                        <div class="nav-buttons">

                            <button type="button" id="prev-month" class="nav-btn">
                                <i class="fas fa-chevron-left"></i>
                            </button>

                            <button type="button" id="next-month" class="nav-btn">
                                <i class="fas fa-chevron-right"></i>
                            </button>

                        </div>

                        <div class="month-year" id="month-year">
                            Julio 2026
                        </div>

                    </div>

                    <div class="weekdays">
                        <div>Dom</div><div>Lun</div><div>Mar</div>
                        <div>Mié</div><div>Jue</div><div>Vie</div><div>Sáb</div>
                    </div>

                    <div class="days" id="days"></div>

                    <div class="calendar-footer">

                        <button type="button" id="today-btn" class="today-btn">
                            <i class="fas fa-calendar-day"></i> Hoy
                        </button>

                    </div>

                </div>

                    <div class="mb-3">
                        <label class="form-label">Observaciones</label>
                        <input type="text" id="observaciones" class="form-control">
                    </div>

                    <button type="submit" class="btn btn-dark w-100">
                        Actualizar Mantenimiento
                    </button>

                    <div id="error-message" class="text-danger text-center mt-3"></div>

                </form>

            </div>

        </div>

    </div>

    <script src="./js/upd_mantenimiento.js"></script>

</body>
</html>
