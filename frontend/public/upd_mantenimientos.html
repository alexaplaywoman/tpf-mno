<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Actualizar Mantenimiento</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/css/bootstrap.min.css">
</head>

<body class="bg-light">

    <nav class="navbar navbar-dark bg-secondary px-3">
        <a id="atras" class="btn btn-dark btn-sm" href="#">
            Atrás
        </a>
    </nav>

    <div class="container mt-5">

        <div class="card shadow mx-auto" style="max-width: 600px;">

            <div class="card-body">

                <h2 class="text-center mb-4">
                    Actualizar Mantenimiento
                </h2>

                <form id="update-recurso-form">

                    <div class="mb-3">

                    <label class="form-label">
                        Estado Mantenimiento
                    </label>

                    <select
                        id="estadoMantenimiento"
                        class="form-control"
                        required>

                        <option value="R">Realizado</option>
                        <option value="P">Pendiente</option>
                        <option value="E">En proceso</option>
                        <option value="C">Cancelado</option>

                    </select>
                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Laboratorio
                    </label>

                    <select
                        id="laboratorio"
                        class="form-control"
                        required>

                        <option value="">
                            Seleccione un laboratorio
                        </option>

                    </select>

                </div>



                <div class="mb-3">

                    <label class="form-label">
                        Fecha inicio
                    </label>

                    <input type="date"
                           id="fechaInicio"
                           class="form-control"
                           required>

                </div>


                <div class="mb-3">

                    <label class="form-label">
                        Fecha fin reserva
                    </label>

                    <input type="date"
                           id="fechaFinReserva"
                           class="form-control"
                           required>

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Observaciones
                    </label>

                    <input type="text"
                           id="observaciones"
                           class="form-control"
                           required>

                </div>


                    <button
                        type="submit"
                        class="btn btn-dark w-100">
                        Actualizar Reserva
                    </button>

                    <div
                        id="error-message"
                        class="text-danger text-center mt-3">
                    </div>

                </form>

            </div>

        </div>

    </div>

    <script src="./js/upd_reserva.js"></script>

</body>
</html>
