<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agregar Mantenimiento</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="css/calendario.css">
    <link rel="stylesheet" href="css/admin.css">
</head>

<body>

<nav class="navbar navbar-dark bg-secondary px-3">
    <a id="inicio" class="btn btn-dark btn-sm" href="#">
        Atrás
    </a>
</nav>

<div class="container mt-5">

    <div class="card shadow mx-auto" style="max-width:600px;">

        <div class="card-body">

            <h2 class="text-center mb-4">
                Agregar Nuevo Mantenimiento
            </h2>

            <form id="add-mantenimiento-form">

                <div class="mb-3">
                    <label class="form-label">Laboratorio</label>
                    <select id="laboratorio" class="form-control" required>
                        <option value="">Seleccione un laboratorio</option>
                    </select>
                </div>

                <label class="form-label">Fecha inicio</label>
                <input type="hidden" id="fechaInicio">

                <div id="fecha-inicio" class="calendar-container">

                    <div class="calendar-header">

                        <div class="nav-buttons">

                            <button type="button" id="prev-month-inicio" class="nav-btn">
                                <i class="fas fa-chevron-left"></i>
                            </button>

                            <button type="button" id="next-month-inicio" class="nav-btn">
                                <i class="fas fa-chevron-right"></i>
                            </button>

                        </div>

                        <div class="month-year" id="month-year-inicio">
                            Julio 2026
                        </div>

                    </div>

                    <div class="weekdays">
                        <div>Dom</div><div>Lun</div><div>Mar</div>
                        <div>Mié</div><div>Jue</div><div>Vie</div><div>Sáb</div>
                    </div>

                    <div class="days" id="days-inicio"></div>

                    <div class="calendar-footer">

                        <button type="button" id="today-btn-inicio" class="today-btn">
                            <i class="fas fa-calendar-day"></i> Hoy
                        </button>

                    </div>

                </div><br><br>

                <label class="form-label">Fecha fin prevista</label>
                <input type="hidden" id="fechaFinPrevista">

                <div id="fecha-fin" class="calendar-container">

                    <div class="calendar-header">

                        <div class="nav-buttons">

                            <button type="button" id="prev-month-fin" class="nav-btn">
                                <i class="fas fa-chevron-left"></i>
                            </button>

                            <button type="button" id="next-month-fin" class="nav-btn">
                                <i class="fas fa-chevron-right"></i>
                            </button>

                        </div>

                        <div class="month-year" id="month-year-fin">
                            Julio 2026
                        </div>

                    </div>

                    <div class="weekdays">
                        <div>Dom</div><div>Lun</div><div>Mar</div>
                        <div>Mié</div><div>Jue</div><div>Vie</div><div>Sáb</div>
                    </div>

                    <div class="days" id="days-fin"></div>

                    <div class="calendar-footer">

                        <button type="button" id="today-btn-fin" class="today-btn">
                            <i class="fas fa-calendar-day"></i> Hoy
                        </button>

                    </div>

                </div>

                <div class="mb-3">
                    <label class="form-label">Observaciones</label>
                    <input type="text" id="observaciones" class="form-control">
                </div>

                <button type="submit" class="btn btn-dark w-100">
                    Agregar Mantenimiento
                </button>

                <div id="error-message" class="text-danger text-center mt-3"></div>

            </form>

        </div>

    </div>

</div>

<script src="./js/add_mantenimiento.js"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
