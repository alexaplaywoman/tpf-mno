<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="css/estilos.css">

    <title>Reservas - Laboratorios</title>
</head>

<body>

    <nav class="navbar navbar-dark bg-dark w-100 px-3">

        <a id="inicio" class="navbar-brand btn btn-danger btn-sm" href="#">
            Inicio
        </a>

    </nav>

    <div class="d-flex flex-column justify-content-center align-items-center min-vh-100"
         style="transform: translateY(-40px);">

        <div class="text-center w-100">

            <h1 class="fw-bold">LAB KONTROL</h1>

            <h2>
                Reserve un laboratorio para sus actividades académicas
            </h2>

            <h4>
                Elige el laboratorio donde se realizará su actividad
            </h4>

            <br>

            <div class="d-flex justify-content-center align-items-center flex-wrap gap-3 my-4">

                <div class="rounded-pill d-flex justify-content-center align-items-center"
                     style="width:220px; height:45px; background:#e5e5e5; color:#999;">
                    1. Elegir Edificio
                </div>

                <div class="rounded-pill d-flex justify-content-center align-items-center"
                     style="width:220px; height:45px; background:#e5e5e5; color:#999;">
                    2. Elegir Tipo de Actividad
                </div>

                <div class="rounded-pill d-flex justify-content-center align-items-center text-white"
                     style="width:220px; height:45px; background:#6c6480;">
                    3. Elegir Laboratorio
                </div>

                <div class="rounded-pill d-flex justify-content-center align-items-center"
                     style="width:220px; height:45px; background:#e5e5e5; color:#999;">
                    4. Confirmar Reserva
                </div>

            </div>

        </div>

        <div class="d-flex justify-content-center gap-4 flex-wrap">

            <button id="lab1"
                    class="btn btn-outline-dark text-center p-2"
                    style="width:160px; height:220px;"
                    onclick="laboratorio1()">

                <img src="image/camara.jpeg"
                     style="width:100%; height:130px; object-fit:cover;"
                     class="mb-2">

                <br>

                <strong>Laboratorio 1</strong>

            </button>

            <button id="lab2"
                    class="btn btn-outline-dark text-center p-2"
                    style="width:160px; height:220px;"
                    onclick="laboratorio2()">

                <img src="image/jo_pyo.png"
                     style="width:100%; height:130px; object-fit:cover;"
                     class="mb-2">

                <br>

                <strong>Laboratorio 2</strong>

            </button>

            <button id="lab3"
                    class="btn btn-outline-dark text-center p-2"
                    style="width:160px; height:220px;"
                    onclick="laboratorio3()">

                <img src="image/Margarita.jpeg"
                     style="width:100%; height:130px; object-fit:cover;"
                     class="mb-2">

                <br>

                <strong>Laboratorio 3</strong>

            </button>

            <button id="lab4"
                    class="btn btn-outline-dark text-center p-2"
                    style="width:160px; height:220px;"
                    onclick="laboratorio4()">

                <img src="image/Mar y Rey.jpeg"
                     style="width:100%; height:130px; object-fit:cover;"
                     class="mb-2">

                <br>

                <strong>Laboratorio 4</strong>

            </button>

            <button id="lab5"
                    class="btn btn-outline-dark text-center p-2"
                    style="width:160px; height:220px;"
                    onclick="laboratorio5()">

                <img src="image/periodismo.jpeg"
                     style="width:100%; height:130px; object-fit:cover;"
                     class="mb-2">

                <br>

                <strong>Laboratorio 5</strong>

            </button>

        </div>

        <div class="d-flex justify-content-center gap-3 mt-4">

            <button id="botonAtras" type="button" class="btn btn-lg btn-secondary">
                Atrás
            </button>

            <button id="botonSiguiente" type="button" class="btn btn-lg btn-primary">
                Siguiente
            </button>

        </div>

    </div>

    <script src="laboratorios.js"></script>

</body>
</html>
