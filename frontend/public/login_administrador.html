<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/css/bootstrap.min.css">
        <link rel="stylesheet" href="css/estilos.css">

        <title>Login - Administrador</title>
    </head>

    <body class="d-flex justify-content-center align-items-center vh-100">
        <div class="mb-4">
            <h1>Login</h1>

            <form id="formLogin">
                <div class="form-group">
                    <label for="usuario">Usuario</label>
                    <input type="text" id="usuario" name="usuario" required class="form-control"><br>
                </div>

                <div class="form-group">
                    <label for="clave">Clave</label>
                    <input type="password" id="clave" name="clave" required class="form-control"><br>
                </div>

                <div class="text-center">
                    <button type="submit" class="btn btn-login px-4">Ingresar</button>
                </div>
            </form>

            <div id="msgError" class="alert alert-danger mt-3 d-none" role="alert"></div>

            <p id="ingresar"></p>
            <script src="/js/login.js"></script>
        </div>
    </body>
</html>
