<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Actualizar Actividad</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/css/bootstrap.min.css">

</head>

<body class="bg-light">

    <nav class="navbar navbar-dark bg-secondary px-3">

        <a id="atras"
           class="btn btn-dark btn-sm"
           href="#">
            Atrás
        </a>

    </nav>

    <div class="alert alert-success text-center mx-auto mt-3"
         role="alert"
         style="max-width: 600px;">

        <strong>Niveles de prioridad:</strong>
        utilice valores del <strong>1</strong> al <strong>7</strong>, donde el
        <strong>1</strong> representa la prioridad más alta y el
        <strong>7</strong> la prioridad más baja.

    </div>

    <div class="container mt-5">

        <div class="card shadow mx-auto" style="max-width:600px;">

            <div class="card-body">

                <h2 class="text-center mb-4">
                    Actualizar Actividad
                </h2>

                <form id="update-recurso-form">

                    <div class="mb-3">

                        <label class="form-label">
                            Prioridad
                        </label>

                        <select
                            id="prioridad"
                            class="form-control"
                            required>

                            <option value="">
                                Seleccione una prioridad
                            </option>

                        </select>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            Nombre de la actividad
                        </label>

                        <select
                            id="nombreActividad"
                            class="form-control"
                            required>

                            <option value="">
                                Seleccione un nombre de actividad
                            </option>

                        </select>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            Nivel de prioridad
                        </label>

                        <input
                            type="number"
                            id="nivelPrioridad"
                            class="form-control"
                            min="1"
                            max="7"
                            required>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            Duración máxima de horas
                        </label>

                        <input
                            type="number"
                            id="duracionMaxHoras"
                            class="form-control"
                            min="1"
                            required>

                    </div>

                    <button
                        type="submit"
                        class="btn btn-dark w-100">
                        Actualizar Actividad
                    </button>

                    <div
                        id="error-message"
                        class="text-danger text-center mt-3">
                    </div>

                </form>

            </div>

        </div>

    </div>

    <script src="./js/upd_actividad.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
