<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="css/estilos.css">

    <title>Reservas</title>
</head>

<body>

<nav class="navbar navbar-dark bg-dark w-100 px-3">

    <a id="inicio" class="navbar-brand btn btn-danger btn-sm" href="#">
        Inicio
    </a>

    <div class="d-flex flex-row gap-4 mx-auto text-white">

        <div class="paso-activo" style="opacity:0.3;">
            Elegir Edificio
        </div>

        <div class="paso-inactivo" style="opacity:0.3;">
            Elegir Tipo de Evento
        </div>

        <div class="paso-inactivo" style="opacity:0.3;">
            Elegir Laboratorio
        </div>

        <div class="paso-inactivo">
            Confirmar Reserva
        </div>

    </div>

</nav>


<div class="container-fluid mt-5">

    <div class="text-center w-100">

        <h1 class="fw-bold">LAB KONTROL</h1>

        <h2>
            Reserve un laboratorio para sus actividades académicas
        </h2>

        <h4>
            Ingrese sus datos para confirmar la reserva
        </h4>

        <br>

    </div>


    <div class="row justify-content-center">


        <div class="col-md-5 d-flex justify-content-end">


            <div style="width:320px;">


                <label>Documento de Identidad</label>
                <input type="number" class="form-control">

                <br>

                <label>Nombre</label>
                <input type="text" class="form-control">

                <br>

                <label>Apellido</label>
                <input type="text" class="form-control">

                <br>

                <label>Correo Institucional</label>
                <input type="email" class="form-control">

                <br>

                <label>Telefono</label>
                <input type="number" class="form-control">

                <br>

                <label>Departamento</label>

                <select class="form-select">

                    <option>Seleccionar</option>
                    <option>DA - Arquitectura</option>
                    <option>DAS - Análisis de Sistemas</option>
                    <option>DEI - Ing. Informática y Electrónica</option>
                    <option>DICIA - Ing. Civil, Industrial y Ambiental</option>
                    <option>DIS - Diseño Gráfico e industrial</option>

                </select>

                <br>

                <label>Solicitante</label>

                <select class="form-select">

                    <option>Seleccionar</option>
                    <option>Docente</option>
                    <option>Estudiante</option>
                    <option>Personal Administrativo</option>

                </select>

                <br>

                <div class="d-flex gap-2">

                    <button class="btn btn-dark btn-sm" id="botonConfirmar">
                        Confirmar
                    </button>

                    <button class="btn btn-dark btn-sm" id="botonCancelar">
                        Cancelar
                    </button>

                </div>


            </div>

        </div>


        <div class="col-md-5 d-flex align-items-start justify-content-start">

            <div style="
                background-color:#c9a6bb;
                border:1px solid #ccc;
                padding:20px;
                width:350px;
                border-radius:10px;
                margin-top:10px;
                text-align:left;">

                <h5>Datos de Reserva</h5>

                <p style="margin:0;">Fecha:</p>
                <p style="margin:0;">Cantidad de Alumnos:</p>
                <p style="margin:0;">Tipo de actividad:</p>

            </div>

        </div>


    </div>

</div>

<script src="confirmar.js"></script>

</body>
</html>
