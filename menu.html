<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="css/estilos.css">

    <title>Reserva - Edificio</title>
</head>

<body>

<!-- BARRA -->
<nav class="navbar navbar-dark bg-dark w-100 px-3">

    <a id="inicio" class="navbar-brand btn btn-danger btn-sm" href="#">
        Inicio
    </a>

    <div class="d-flex flex-row gap-4 mx-auto text-white">

        <div class="paso-activo">
            Elegir Edificio
        </div>

        <div class="paso-inactivo" style="opacity:0.3;">
            Elegir Tipo de Evento
        </div>

        <div class="paso-inactivo" style="opacity:0.3;">
            Elegir Laboratorio
        </div>

        <div class="paso-inactivo" style="opacity:0.3;">
            Confirmar Reserva
        </div>

    </div>

</nav>

<!-- CONTENIDO -->
<div class="d-flex justify-content-center align-items-center vh-100">

    <div class="text-center w-100">

        <h1 class="fw-bold">LAB KONTROL</h1>

        <h2>Reserve un laboratorio para sus actividades académicas</h2>

        <h4>Seleccione el edificio donde se realiza su actividad</h4>

        <br><br>

        <div class="d-flex justify-content-center gap-4 flex-wrap">

            <button id="edif1" class="btn btn-outline-dark text-center p-2"
                    style="width:160px; height:220px;"
                    onclick="edificio1()">

                <img src="image/labubu divo.jpeg"
                     style="width:100%; height:130px; object-fit:cover;"
                     class="mb-2">

                <br>
                <strong>Edificio 1</strong>
                <p id="edif1"></p>

            </button>

            <button id="edif2" class="btn btn-outline-dark text-center p-2"
                    style="width:160px; height:220px;"
                    onclick="edificio2()">

                <img src="image/mique y beni.jpeg"
                     style="width:100%; height:130px; object-fit:cover;"
                     class="mb-2">

                <br>
                <strong>Edificio 2</strong>
                <p id="edif2"></p>

            </button>

            <button id="edif3" class="btn btn-outline-dark text-center p-2"
                    style="width:160px; height:220px;"
                    onclick="edificio3()">

                <img src="image/mis trillis.png"
                     style="width:100%; height:130px; object-fit:cover;"
                     class="mb-2">

                <br>
                <strong>Edificio 3</strong>
                <p id="edif3"></p>

            </button>

            <button id="edif4" class="btn btn-outline-dark text-center p-2"
                    style="width:160px; height:220px;"
                    onclick="edificio4()">

                <img src="image/mora y beni.jpeg"
                     style="width:100%; height:130px; object-fit:cover;"
                     class="mb-2">

                <br>
                <strong>Edificio 4</strong>
                <p id="edif4"></p>

            </button>

        </div>

        <br><br>

        <p id="resultado"></p>

    </div>

</div>

<script src="edificio.js"></script>

</body>
</html>
