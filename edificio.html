<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/css/bootstrap.min.css">

    <link rel="stylesheet" href="css/estilos.css">

    <title>Reserva - Edificio</title>
</head>

<body>

    <!-- BARRA SUPERIOR -->
    <nav class="navbar navbar-dark bg-dark px-3">

        <a id="inicio"
           class="navbar-brand btn btn-danger btn-sm"
           href="#">
            Inicio
        </a>

    </nav>

    <!-- CONTENIDO -->
    <div class="container text-center mt-5">

        <h1 class="fw-bold">LAB KONTROL</h1>

        <h2>Reserve un laboratorio para sus actividades académicas</h2>

        <br>

        <h4>Seleccione el edificio donde se realiza su actividad</h4>

        <!-- LINEA DE TIEMPO -->
        <div class="d-flex justify-content-center flex-wrap my-4">

            <div class="rounded-pill py-2 px-4 text-white"
                 style="background-color:#6c6480; min-width:220px;">
                1. Elegir Edificio
            </div>

            <div class="rounded-pill py-2 px-4 ms-2"
                 style="background-color:#e5e5e5; color:#999; min-width:220px;">
                2. Elegir Tipo de Evento
            </div>

            <div class="rounded-pill py-2 px-4 ms-2"
                 style="background-color:#e5e5e5; color:#999; min-width:220px;">
                3. Elegir Sala
            </div>

            <div class="rounded-pill py-2 px-4 ms-2"
                 style="background-color:#e5e5e5; color:#999; min-width:220px;">
                4. Confirmar Reserva
            </div>

        </div>

        <br>

        <!-- EDIFICIOS -->
        <div class="d-flex justify-content-center gap-4 flex-wrap">

            <button id="edif1"
                    class="btn btn-outline-dark text-center p-2"
                    style="width:180px; height:250px;"
                    onclick="edificio1()">

                <img src="image/labubu divo.jpeg"
                     style="width:100%; height:140px; object-fit:cover;"
                     class="mb-2">

                <strong>Edificio 1</strong>

            </button>

            <button id="edif2"
                    class="btn btn-outline-dark text-center p-2"
                    style="width:180px; height:250px;"
                    onclick="edificio2()">

                <img src="image/mique y beni.jpeg"
                     style="width:100%; height:140px; object-fit:cover;"
                     class="mb-2">

                <strong>Edificio 2</strong>

            </button>

            <button id="edif3"
                    class="btn btn-outline-dark text-center p-2"
                    style="width:180px; height:250px;"
                    onclick="edificio3()">

                <img src="image/mis trillis.png"
                     style="width:100%; height:140px; object-fit:cover;"
                     class="mb-2">

                <strong>Edificio 3</strong>

            </button>

            <button id="edif4"
                    class="btn btn-outline-dark text-center p-2"
                    style="width:180px; height:250px;"
                    onclick="edificio4()">

                <img src="image/mora y beni.jpeg"
                     style="width:100%; height:140px; object-fit:cover;"
                     class="mb-2">

                <strong>Edificio 4</strong>

            </button>

        </div>

        <br><br>

        <p id="resultado"></p>

    </div>

    <script src="edificio.js"></script>

</body>

</html>
