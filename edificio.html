<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/css/bootstrap.min.css">
    <title>Reservas</title>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-dark w-100 px-3">

    <a class="navbar-brand btn btn-danger btn-sm" href="#">
        Inicio
    </a>

    <div class="d-flex flex-row gap-4 mx-auto text-white">
        <div style="opacity: 0.6;">Elegir Edificio</div>
        <div style="opacity: 0.6;">Elegir Tipo de Evento</div>
        <div style="opacity: 0.6;">Elegir Laboratorio</div>
        <div style="opacity: 0.6;">Confirmar Reserva</div>
    </div>

</nav>

<!-- CONTENIDO -->
<div class="d-flex justify-content-center align-items-center vh-100">

    <div class="text-center w-100">

        <h1 class="fw-bold">LAB KONTROL</h1>
        <h2>Reserve un laboratorio para sus actividades académicas</h2>
        <h3>Seleccione el edificio donde se realiza el evento</h3>

        <br><br>

        <!-- GRID EDIFICIOS -->
        <div class="d-flex justify-content-center gap-4 flex-wrap">

            <!-- EDIFICIO 1 -->
            <button class="btn btn-outline-dark text-center p-2"
                    style="width:160px; height:220px;"
                    onclick="reservar()">

                <img src="image/labubu divo.jpeg"
                     style="width:100%; height:130px; object-fit:cover;"
                     class="mb-2">

                <br>
                <strong>Edificio 1</strong>

                <p id="edif1"></p>
            </button>

            <!-- EDIFICIO 2 -->
            <button class="btn btn-outline-dark text-center p-2"
                    style="width:160px; height:220px;"
                    onclick="edificio2()">

                <img src="image/mique y beni.jpeg"
                     style="width:100%; height:130px; object-fit:cover;"
                     class="mb-2">

                <br>
                <strong>Edificio 2</strong>

                <p id="edif2"></p>
            </button>

            <!-- EDIFICIO 3 -->
            <button class="btn btn-outline-dark text-center p-2"
                    style="width:160px; height:220px;"
                    onclick="edificio3()">

                <img src="image/mis trillis.png"
                     style="width:100%; height:130px; object-fit:cover;"
                     class="mb-2">

                <br>
                <strong>Edificio 3</strong>

                <p id="edif3"></p>
            </button>

            <!-- EDIFICIO 4 -->
            <button class="btn btn-outline-dark text-center p-2"
                    style="width:160px; height:220px;"
                    onclick="edificio4()">

                <img src="image/mora y beni.jpeg"
                     style="width:100%; height:130px; object-fit:cover;"
                     class="mb-2">

                <br>
                <strong>Edificio 4</strong>

                <p id="edif4"></p>
            </button>

        </div>

        <br><br>

        <!-- BOTÓN AZUL ABAJO -->
        <div class="d-flex justify-content-center">
            <button type="button"
                    class="btn btn-primary px-5"
                    onclick="ejercicio2()">
                Mostrar días
            </button>
        </div>

        <br>

        <p id="resultado2"></p>

    </div>
</div>

<!-- SCRIPTS -->
<script src="edificios1js.js"></script>  <!-- boton del edificio 1 -->
<script src="edificios2js.js"></script>  <!-- boton del edificio 2 -->
<script src="edificios3js.js"></script>  <!-- boton del edificio 3-->
<script src="edificios4js.js"></script>  <!-- boton del edificio 4 -->
<script src="script_ej2.js"></script>    <!-- boton de inicio -->

</body>
</html>
